<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOPSPHERE — Login/Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--background);
            margin: 0;
            padding: 20px;
        }

        .auth-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        .auth-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 36px;
            color: var(--text);
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .auth-title {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 30px;
            color: var(--text);
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--background);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 16px;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .auth-toggle {
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .auth-toggle a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .auth-toggle a:hover {
            text-decoration: underline;
        }

        #nameField {
            display: none;
        }

        .error-msg {
            color: #ef4444;
            font-size: 14px;
            margin-bottom: 15px;
            text-align: left;
            display: none;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-logo">SHOPSPHERE</div>
        <h2 class="auth-title" id="authTitle">Welcome Back</h2>
        
        <div class="error-msg" id="errorMsg"></div>
        
        <form id="authForm">
            <div class="input-group" id="nameField">
                <label>Full Name</label>
                <input type="text" id="authName" placeholder="John Doe">
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="authEmail" required placeholder="you@example.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="authPassword" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary" style="width: 100%; padding: 14px; font-size: 16px;" id="authSubmitBtn">Log In</button>
        </form>

        <div class="auth-toggle">
            <span id="authToggleText">Don't have an account?</span> 
            <a href="#" id="authToggleLink">Sign up</a>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="auth.js"></script>
</body>
</html>
