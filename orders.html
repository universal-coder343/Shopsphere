<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHOPSPHERE — My Orders</title>
  <meta name="description" content="Track all your ShopSphere orders in one place. Follow your delivery status from Placed to Delivered.">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Orders Page Layout ── */
    .orders-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 70px;
      background: rgba(10,10,10,0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .orders-container {
      max-width: 860px;
      margin: 0 auto;
      padding: 100px 24px 60px;
    }

    .orders-heading {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .orders-heading span { color: var(--accent); }

    .orders-subtitle {
      color: var(--text-muted);
      font-size: 15px;
      margin-bottom: 40px;
    }

    /* ── Empty State ── */
    .orders-empty {
      text-align: center;
      padding: 80px 0;
      color: var(--text-muted);
      animation: fadeUp 0.5s ease both;
    }

    .orders-empty .e-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    .orders-empty p {
      font-size: 16px;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    /* ── Order Card ── */
    .order-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      margin-bottom: 20px;
      overflow: hidden;
      transition: border-color 0.25s, transform 0.25s;
      animation: fadeUp 0.5s ease both;
    }

    .order-card:hover {
      border-color: rgba(232,255,60,0.4);
      transform: translateY(-2px);
    }

    .order-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      cursor: pointer;
      gap: 16px;
      flex-wrap: wrap;
    }

    .order-id {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 1px;
      color: var(--accent);
    }

    .order-meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .order-date {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .order-items-count {
      font-size: 13px;
      color: var(--text);
      font-weight: 500;
    }

    .order-total {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }

    .order-card-header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .order-expand-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 16px;
      transition: transform 0.25s, background 0.2s;
      flex-shrink: 0;
    }

    .order-card.expanded .order-expand-icon {
      transform: rotate(180deg);
      background: rgba(232,255,60,0.1);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Status Badge ── */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 99px;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .status-badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .status-placed {
      background: rgba(232,255,60,0.12);
      color: var(--accent);
      border: 1px solid rgba(232,255,60,0.25);
    }

    .status-processing {
      background: rgba(251,191,36,0.12);
      color: #fbbf24;
      border: 1px solid rgba(251,191,36,0.3);
    }

    .status-shipped {
      background: rgba(59,130,246,0.12);
      color: #60a5fa;
      border: 1px solid rgba(59,130,246,0.3);
    }

    .status-delivered {
      background: rgba(74,222,128,0.12);
      color: #4ade80;
      border: 1px solid rgba(74,222,128,0.3);
    }

    .status-cancelled {
      background: rgba(239,68,68,0.1);
      color: #f87171;
      border: 1px solid rgba(239,68,68,0.25);
    }

    /* ── Order Timeline ── */
    .order-timeline {
      padding: 24px 24px 0;
    }

    .timeline-steps {
      display: flex;
      align-items: flex-start;
      position: relative;
      gap: 0;
    }

    .timeline-step {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      text-align: center;
    }

    .timeline-step:not(:last-child)::after {
      content: '';
      position: absolute;
      top: 16px;
      left: 50%;
      width: 100%;
      height: 2px;
      background: var(--border);
      z-index: 0;
      transition: background 0.4s;
    }

    .timeline-step.done:not(:last-child)::after,
    .timeline-step.active:not(:last-child)::after {
      background: var(--accent);
    }

    .timeline-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--surface2);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      position: relative;
      z-index: 1;
      transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
    }

    .timeline-step.done .timeline-dot {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }

    .timeline-step.active .timeline-dot {
      background: rgba(232,255,60,0.15);
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 0 4px rgba(232,255,60,0.15);
      animation: pulse 2s ease-in-out infinite;
    }

    .timeline-step.cancelled .timeline-dot {
      background: rgba(239,68,68,0.15);
      border-color: #f87171;
      color: #f87171;
    }

    .timeline-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: color 0.3s;
    }

    .timeline-step.done .timeline-label,
    .timeline-step.active .timeline-label {
      color: var(--text);
    }

    /* ── Order Detail (expanded) ── */
    .order-detail {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .order-card.expanded .order-detail {
      max-height: 800px;
    }

    .order-detail-inner {
      padding: 16px 24px 24px;
      border-top: 1px solid var(--border);
      margin-top: 24px;
    }

    .order-detail-title {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
      font-weight: 600;
    }

    .order-item-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .order-item-row:last-child {
      border-bottom: none;
    }

    .order-item-emoji {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .order-item-info {
      flex: 1;
    }

    .order-item-name {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .order-item-cat {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .order-item-right {
      text-align: right;
    }

    .order-item-price {
      font-size: 15px;
      font-weight: 700;
      color: var(--accent);
    }

    .order-item-qty {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ── Loading state ── */
    .orders-loading {
      text-align: center;
      padding: 60px;
      color: var(--text-muted);
      font-size: 16px;
    }

    .spinner {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 4px rgba(232,255,60,0.15); }
      50%       { box-shadow: 0 0 0 8px rgba(232,255,60,0.08); }
    }
  </style>
</head>
<body>

  <nav class="orders-nav">
    <a href="index.html" class="nav-logo" style="text-decoration:none;">SHOPSPHERE</a>
    <div style="display:flex; align-items:center; gap:14px;">
      <span id="orderUserName" style="font-weight:500; color:var(--text-muted);"></span>
      <button class="btn-outline" onclick="handleLogout()" style="padding:6px 16px; font-size:14px;">Log Out</button>
    </div>
  </nav>

  <div class="orders-container">
    <div class="orders-heading">MY <span>ORDERS</span></div>
    <p class="orders-subtitle">Track all your purchases and delivery status.</p>

    <div id="ordersContent">
      <div class="orders-loading">
        <div class="spinner"></div>
        <p>Loading your orders…</p>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="orders.js"></script>
</body>
</html>
